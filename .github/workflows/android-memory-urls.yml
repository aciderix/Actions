name: Android memory URL extraction

on:
  workflow_dispatch:
    inputs:
      capture_mode:
        description: Sélectionnez le compromis vitesse/couverture pour ce lancement
        required: true
        default: "network — Appels réseau uniquement (recommandé)"
        type: choice
        options:
          - "network — Appels réseau uniquement (recommandé)"
          - "memory — Scan mémoire uniquement"
          - "both — Les deux"
      scan_limit_mib:
        description: Maximum readable memory to scan (MiB); use 0 for no limit
        required: false
        default: "768"
        type: string
  push:
    paths:
      - ".github/workflows/android-memory-urls.yml"
      - "tools/extract_urls_from_memory.py"
      - "tools/extract_urls_from_emulator.sh"
      - "valkyrie-anatomia-2.0.3.apk"

permissions:
  contents: read

jobs:
  extract-urls:
    name: Extract URLs from app memory
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-url-extraction.txt

      # GitHub-hosted runners are fresh for every job. Preserve the Android
      # system image and AVD so subsequent runs do not recreate them.
      - name: Restore Android emulator cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/system-images/android-30/google_apis/x86
            ~/.android/avd
            ~/.android/adb*
          key: android-emulator-api30-google-apis-x86-v1

      - name: Restore Frida server cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/frida-server
          key: frida-server-16.6.6-android-x86-v1

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", MODE="0666", GROUP="kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start emulator, install and launch app
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86
          disable-linux-hw-accel: false
          emulator-boot-timeout: 300
          profile: pixel_2
          avd-name: url-extractor-api30
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect -camera-back none
          script: bash tools/extract_urls_from_emulator.sh "${{ inputs.scan_limit_mib || '768' }}" "${{ inputs.capture_mode || 'both' }}"

      - name: Upload extracted URLs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extracted-urls
          path: results/urls.txt
          if-no-files-found: warn

name: Android memory URL extraction

on:
  workflow_dispatch:
    inputs:
      scan_limit_mib:
        description: Maximum readable memory to scan (MiB); use 0 for no limit
        required: false
        default: "768"
        type: string
  push:
    paths:
      - ".github/workflows/android-memory-urls.yml"
      - "tools/extract_urls_from_memory.py"
      - "tools/extract_urls_from_emulator.sh"
      - "valkyrie-anatomia-2.0.3.apk"

permissions:
  contents: read

jobs:
  extract-urls:
    name: Extract URLs from app memory
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", MODE="0666", GROUP="kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start emulator, install and launch app
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86
          disable-linux-hw-accel: false
          emulator-boot-timeout: 1200
          profile: pixel_2
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect -camera-back none
          script: bash tools/extract_urls_from_emulator.sh "${{ inputs.scan_limit_mib || '768' }}"

      - name: Upload extracted URLs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extracted-urls
          path: results/urls.txt
          if-no-files-found: warn
